<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Gerenciamento de Agendamentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-gold: #c5a059; --primary-dark: #1a1a1a; }
        .bg-gold { background-color: var(--primary-gold); }
        .text-gold { color: var(--primary-gold); }
        .border-gold { border-color: var(--primary-gold); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen p-6">
    <div class="max-w-6xl mx-auto bg-white shadow-lg rounded-lg p-6">
        <header class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Painel Administrativo</h1>
                <p class="text-sm text-gray-500">Gerencie, aceite ou exclua os agendamentos dos clientes</p>
            </div>
            <button onclick="carregarAgendamentos()" class="bg-gold text-white px-4 py-2 rounded hover:opacity-90 font-medium text-sm">Atualizar Lista</button>
        </header>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200 text-gray-700 uppercase text-xs tracking-wider">
                        <th class="p-3">Cliente</th>
                        <th class="p-3">Telefone</th>
                        <th class="p-3">Serviço</th>
                        <th class="p-3">Data</th>
                        <th class="p-3">Horário</th>
                        <th class="p-3">Status</th>
                        <th class="p-3 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-agendamentos" class="divide-y divide-gray-200 text-sm">
                    <tr>
                        <td colspan="7" class="p-6 text-center text-gray-500">Carregando agendamentos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zehvxzqqideeyqdvnnwp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Qb7Nyhl4R-9d7cUjEHMpvg_D5HRB9as';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarAgendamentos() {
            const tbody = document.getElementById('lista-agendamentos');
            tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-gray-500">Carregando agendamentos...</td></tr>`;

            const { data, error } = await supabaseClient
                .from('agendamentos')
                .select('*')
                .order('data', { ascending: true })
                .order('horario', { ascending: true });

            if (error) {
                console.error('Erro ao buscar agendamentos:', error);
                tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-red-500">Erro ao carregar dados. Verifique a conexão com o Supabase.</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-gray-500">Nenhum agendamento encontrado.</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 font-medium">${item.nome_cliente || item.cliente || 'Cliente'}</td>
                    <td class="p-3">${item.telefone || '-'}</td>
                    <td class="p-3">${item.servico}</td>
                    <td class="p-3">${item.data.split('-').reverse().join('/')}</td>
                    <td class="p-3 font-semibold text-gray-900">${item.horario}</td>
                    <td class="p-3">
                        <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${item.status === 'Confirmado' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                            ${item.status || 'Pendente'}
                        </span>
                    </td>
                    <td class="p-3 text-center space-x-2">
                        <button onclick="atualizarStatus('${item.id}', 'Confirmado')" class="bg-green-500 text-white px-3 py-1 rounded text-xs hover:bg-green-600 font-medium">Aceitar</button>
                        <button onclick="excluirAgendamento('${item.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-xs hover:bg-red-600 font-medium">Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function atualizarStatus(id, novoStatus) {
            const { error } = await supabaseClient
                .from('agendamentos')
                .update({ status: novoStatus })
                .eq('id', id);

            if (error) {
                alert('Erro ao atualizar status: ' + error.message);
            } else {
                carregarAgendamentos();
            }
        }

        async function excluirAgendamento(id) {
            if (confirm('Tem certeza que deseja excluir este agendamento?')) {
                const { error } = await supabaseClient
                    .from('agendamentos')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Erro ao excluir: ' + error.message);
                } else {
                    carregarAgendamentos();
                }
            }
        }

        carregarAgendamentos();
    </script>
</body>
</html>
