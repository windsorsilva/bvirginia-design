<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B Virginia Design ✨ - Agendamentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-gold: #c5a059; --primary-dark: #1a1a1a; }
        .bg-gold { background-color: var(--primary-gold); }
        .text-gold { color: var(--primary-gold); }
        .border-gold { border-color: var(--primary-gold); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col justify-between">

    <header class="bg-white shadow-sm py-4 px-6 text-center">
        <h1 class="text-2xl font-bold tracking-wide text-gray-900">B Virginia Design ✨</h1>
        <p class="text-sm text-gray-500">Agende seu horário com facilidade</p>
    </header>

    <main class="max-w-xl mx-auto p-6 bg-white shadow-md rounded-lg my-8 w-full">
        <h2 class="text-xl font-semibold mb-4 text-center text-gray-800 border-b pb-2">Novo Agendamento</h2>
        
        <form id="form-agendamento" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Seu Nome</label>
                <input type="text" id="nome" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-gold focus:border-gold">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Seu Telefone / WhatsApp</label>
                <input type="tel" id="telefone" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-gold focus:border-gold">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Serviço e Duração</label>
                <select id="servico" required onchange="carregarHorariosDisponiveis()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-gold focus:border-gold">
                    <option value="" data-duracao="30">Selecione um serviço...</option>
                    <option value="Design Simples" data-duracao="30">Design Simples (30 min)</option>
                    <option value="Design Completo" data-duracao="60">Design Completo (1 hora)</option>
                    <option value="Procedimento Premium" data-duracao="120">Procedimento Premium (2 horas)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Data do Agendamento</label>
                <input type="date" id="data" required onchange="carregarHorariosDisponiveis()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-gold focus:border-gold">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Horários Disponíveis (Intervalos de 30 em 30 min)</label>
                <div id="grid-horarios" class="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto p-2 border rounded-md bg-gray-50">
                    <span class="text-sm text-gray-400 col-span-3 text-center py-4">Selecione o serviço e a data primeiro.</span>
                </div>
                <input type="hidden" id="horario-selecionado" required>
            </div>

            <button type="submit" class="w-full bg-gold text-white font-bold py-2 px-4 rounded-md hover:opacity-90 transition">
                Confirmar Agendamento
            </button>
        </form>
    </main>

    <footer class="text-center py-4 text-xs text-gray-400">
        &copy; 2026 B Virginia Design. Todos os direitos reservados.
    </footer>

    <script>
        const SUPABASE_URL = 'https://zehvxzqqideeyqdvnnwp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Qb7Nyhl4R-9d7cUjEHMpvg_D5HRB9as';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('data').min = new Date().toISOString().split('T')[0];

        let horarioEscolhido = '';

        async function carregarHorariosDisponiveis() {
            const dataInput = document.getElementById('data').value;
            const selectServico = document.getElementById('servico');
            const grid = document.getElementById('grid-horarios');
            
            if (!dataInput || !selectServico.value) {
                grid.innerHTML = `<span class="text-sm text-gray-400 col-span-3 text-center py-4">Selecione o serviço e a data primeiro.</span>`;
                return;
            }

            const selectedOption = selectServico.options[selectServico.selectedIndex];
            const duracaoServicoMinutos = parseInt(selectedOption.getAttribute('data-duracao')) || 30;

            grid.innerHTML = `<span class="text-sm text-gray-500 col-span-3 text-center py-4">Carregando horários...</span>`;

            const { data: agendamentosExistentes, error } = await supabaseClient
                .from('agendamentos')
                .select('horario, servico')
                .eq('data', dataInput);

            if (error) {
                console.error('Erro ao buscar horários ocupados:', error);
                grid.innerHTML = `<span class="text-sm text-red-500 col-span-3 text-center py-4">Erro ao carregar horários.</span>`;
                return;
            }

            let slotsOcupados = new Set();
            if (agendamentosExistentes) {
                agendamentosExistentes.forEach(item => {
                    let [h, m] = item.horario.split(':').map(Number);
                    let inicioMinutosOcupados = h * 60 + m;
                    
                    let duracaoOcupada = 30;
                    if (item.servico && item.servico.includes('Completo')) duracaoOcupada = 60;
                    if (item.servico && item.servico.includes('Premium')) duracaoOcupada = 120;

                    for (let mOffset = 0; mOffset < duracaoOcupada; mOffset += 30) {
                        let totalMin = inicioMinutosOcupados + mOffset;
                        let hStr = Math.floor(totalMin / 60).toString().padStart(2, '0');
                        let mStr = (totalMin % 60).toString().padStart(2, '0');
                        slotsOcupados.add(`${hStr}:${mStr}`);
                    }
                });
            }

            let inicioExpediente = 9 * 60;
            let fimExpediente = 18 * 60;
            let html = '';

            for (let t = inicioExpediente; t < fimExpediente; t += 30) {
                let hStr = Math.floor(t / 60).toString().padStart(2, '0');
                let mStr = (t % 60).toString().padStart(2, '0');
                let horarioAtual = `${hStr}:${mStr}`;

                let slotInvalido = false;
                for (let checkOffset = 0; checkOffset < duracaoServicoMinutos; checkOffset += 30) {
                    let checkTimeMin = t + checkOffset;
                    let chStr = Math.floor(checkTimeMin / 60).toString().padStart(2, '0');
                    let cmStr = (checkTimeMin % 60).toString().padStart(2, '0');
                    let checkSlotStr = `${chStr}:${cmStr}`;

                    if (checkTimeMin > fimExpediente || slotsOcupados.has(checkSlotStr)) {
                        slotInvalido = true;
                        break;
                    }
                }

                if (slotInvalido) {
                    html += `<button type="button" disabled class="bg-gray-200 text-gray-400 py-2 rounded text-sm cursor-not-allowed line-through">${horarioAtual}</button>`;
                } else {
                    let isSelected = horarioEscolhido === horarioAtual ? 'bg-gold text-white font-bold' : 'bg-white border border-gray-300 hover:bg-gray-100 text-gray-700';
                    html += `<button type="button" onclick="selecionarHorario('${horarioAtual}')" class="${isSelected} py-2 rounded text-sm transition">${horarioAtual}</button>`;
                }
            }

            grid.innerHTML = html || `<span class="text-sm text-gray-500 col-span-3 text-center py-4">Nenhum horário disponível para esta data.</span>`;
        }

        function selecionarHorario(horario) {
            horarioEscolhido = horario;
            document.getElementById('horario-selecionado').value = horario;
            carregarHorariosDisponiveis();
        }

        document.getElementById('form-agendamento').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const servico = document.getElementById('servico').value;
            const data = document.getElementById('data').value;
            const horario = document.getElementById('horario-selecionado').value;

            if (!horario) {
                alert('Por favor, selecione um horário disponível.');
                return;
            }

            const { error } = await supabaseClient
                .from('agendamentos')
                .insert([{ nome_cliente: nome, telefone, servico, data, horario, status: 'Pendente' }]);

            if (error) {
                alert('Erro ao realizar agendamento: ' + error.message);
            } else {
                alert('Agendamento realizado com sucesso!');
                document.getElementById('form-agendamento').reset();
                horarioEscolhido = '';
                document.getElementById('horario-selecionado').value = '';
                document.getElementById('grid-horarios').innerHTML = `<span class="text-sm text-gray-400 col-span-3 text-center py-4">Selecione o serviço e a data primeiro.</span>`;
            }
        });
    </script>
</body>
</html>
